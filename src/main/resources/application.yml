spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tinyfarm}
    username: ${DB_USERNAME:tinyfarm}
    password: ${DB_PASSWORD:tinyfarm}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}

server:
  port: 8080
